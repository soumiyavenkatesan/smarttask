<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="mb-3">➕ Add New Task</h3>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" class="form-control mb-3" placeholder="Enter task..." required>
            <select name="priority" class="form-control mb-3">
                <option value="high">High 🔴</option>
                <option value="medium">Medium 🟡</option>
                <option value="low">Low 🟢</option>
            </select>
            <button class="btn btn-primary w-100">Add Task</button>
        </form>

        <a href="/" class="btn btn-link mt-3">⬅ Back</a>

    </div>
</div>

</body>
</html>
